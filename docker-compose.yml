version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: zelix_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespass
      POSTGRES_DB: zelix_topup
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: zelix_app
    restart: always
    ports:
      - "8091:8091"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgrespass
      DB_NAME: zelix_topup
      PORT: 8091
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
