<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Category | ZELIX TOPUP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Orbitron:wght@700;800;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared-background.css">
<script src="https://cdn.tailwindcss.com"></script>
<script src="/header.js" defer></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          inter: ['Inter', 'sans-serif'],
          orbitron: ['Orbitron', 'sans-serif'],
          rajdhani: ['Rajdhani', 'sans-serif']
        },
        colors: {
          gold: '#ffb300',
          violet: '#8a2eff',
          blue: '#00c8ff',
          ink: '#07070a'
        },
        boxShadow: {
          gold: '0 0 22px rgba(255,179,0,.42)',
          violet: '0 0 24px rgba(138,46,255,.38)',
          blue: '0 0 22px rgba(0,200,255,.3)'
        }
      }
    }
  }
</script>
<style>
  .grid-bg{background-image:linear-gradient(rgba(255,255,255,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.045) 1px,transparent 1px);background-size:48px 48px}
</style>
</head>
<body class="min-h-screen bg-black text-white font-inter">
  <div class="particles">
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
  </div>

  <main class="relative z-10 mx-auto max-w-[1400px] px-4 py-6 sm:px-6 lg:px-8">
    <div id="categoryHeader" class="mb-6 rounded-2xl border border-white/10 bg-white/[.03] p-5 sm:p-6">
      <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
        <div>
          <div class="font-rajdhani text-xs font-black tracking-[.2em] text-white/50 uppercase">Kateqoriya</div>
          <h1 id="catTitle" class="mt-1 font-orbitron text-2xl font-black text-gold sm:text-3xl">Yüklənir...</h1>
          <p id="catDesc" class="mt-1 max-w-xl text-sm text-white/60"></p>
        </div>
        <div id="catMeta" class="text-right text-xs font-rajdhani font-black text-white/50"></div>
      </div>
    </div>

    <div class="mb-4 flex items-center justify-between">
      <div class="font-rajdhani text-xs font-black tracking-[.2em] text-white/50 uppercase">Məhsullar</div>
      <div class="relative">
        <input id="searchInput" type="text" placeholder="Axtar..." class="w-40 rounded-xl border border-white/10 bg-black/40 px-3 py-2 text-sm text-white outline-none focus:border-gold sm:w-56">
      </div>
    </div>

    <div id="grid" class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">
      <div class="col-span-full flex items-center justify-center py-20">
        <div class="h-10 w-10 animate-spin rounded-full border-4 border-white/10 border-t-gold"></div>
      </div>
    </div>

    <div id="empty" class="hidden rounded-2xl border border-white/10 bg-white/[.03] p-10 text-center">
      <div class="font-orbitron text-lg font-black text-white/70">Bu kateqoriyada məhsul yoxdur</div>
    </div>
  </main>

  <div id="toast" class="fixed bottom-5 right-5 z-50 translate-y-20 transform rounded-2xl border border-gold/40 bg-black/90 px-4 py-3 text-sm font-bold text-gold opacity-0 shadow-gold transition-all"></div>

<script>
const slug = window.location.pathname.split('/').filter(Boolean).pop() || '';

async function api(url, opts={}){
  const token = localStorage.getItem('zelixToken');
  const res = await fetch(url, { ...opts, credentials: 'same-origin', headers: { 'Content-Type': 'application/json', ...(token?{Authorization:`Bearer ${token}`}:{}) } });
  const text = await res.text();
  let data = {};
  try{ data = text ? JSON.parse(text) : {}; }catch{ throw new Error('Server cavabı JSON deyil'); }
  if(!res.ok) throw new Error(data.message || 'Sorğu uğursuz oldu');
  return data;
}

function showToast(msg, type='good'){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `fixed bottom-5 right-5 z-50 rounded-2xl border px-4 py-3 text-sm font-bold shadow-lg transition-all transform ${type==='good'?'border-gold/40 bg-black/90 text-gold shadow-gold':'border-red-400/40 bg-black/90 text-red-300'}`;
  t.style.opacity = '1';
  t.style.transform = 'translateY(0)';
  setTimeout(()=>{ t.style.opacity='0'; t.style.transform='translateY(20px)'; }, 2500);
}

let products = [];

async function loadCategory(){
  try {
    const data = await api('/api/category/' + slug + '/products');
    const category = data.category;
    products = data.products || [];
    document.getElementById('catTitle').textContent = category.name;
    document.getElementById('catDesc').textContent = category.description || '';
    document.getElementById('catMeta').textContent = products.length + ' məhsul';
    render(products, category.image_url);
  } catch (err) {
    document.getElementById('catTitle').textContent = 'Kateqoriya tapılmadı';
    document.getElementById('grid').innerHTML = '<div class="col-span-full text-center text-white/60 py-12">' + err.message + '</div>';
  }
}

function render(list, catImage){
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  if (!list.length) {
    grid.innerHTML = '';
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');
  grid.innerHTML = list.map(p => {
    const img = p.image_url || catImage || '/assets/zelix-generated-logo.svg';
    return `
      <div class="rounded-2xl border border-white/10 bg-white/[.03] p-4 transition hover:border-gold/30">
        <div class="flex items-center gap-3">
          <img src="${img}" alt="${p.title}" class="h-12 w-12 rounded-xl border border-white/10 bg-white/[.06] p-1 object-cover" onerror="this.src='/assets/zelix-generated-logo.svg'">
          <div class="font-orbitron text-lg font-black">${p.title}</div>
        </div>
        <div class="mt-3 flex items-center justify-between">
          <div class="font-rajdhani text-sm font-black text-white/70">Qiymət</div>
          <div class="font-orbitron text-xl font-black text-gold">${Number(p.price).toFixed(2)} ₼</div>
        </div>
        <div class="mt-3 flex items-center justify-between">
          <div class="font-rajdhani text-sm font-black text-white/70">Mövcudluq</div>
          <div class="font-orbitron text-sm font-black ${p.available?'text-emerald-300':'text-red-300'}">${p.available?'Stokda':'Yoxdur'}</div>
        </div>
        <div class="mt-4 flex items-center justify-between">
          <div class="inline-flex items-center gap-2 rounded-xl border border-white/10 bg-black/30 px-2 py-1">
            <button class="qty-dec px-2 text-white/70 hover:text-white" data-pid="${p.id}">-</button>
            <span class="qty font-orbitron" data-pid="${p.id}">1</span>
            <button class="qty-inc px-2 text-white/70 hover:text-white" data-pid="${p.id}">+</button>
          </div>
          <button class="add-cart rounded-xl bg-gradient-to-r from-amber-300 via-gold to-orange-500 px-3 py-2 font-rajdhani text-xs font-black text-black shadow-[0_0_18px_rgba(255,179,0,.35)] transition hover:-translate-y-0.5" data-pid="${p.id}">Səbətə Əlavə Et</button>
        </div>
      </div>
    `;
  }).join('');

  document.querySelectorAll('.qty-inc').forEach(b => b.addEventListener('click', () => {
    const el = document.querySelector(`.qty[data-pid="${b.dataset.pid}"]`);
    el.textContent = String(Math.min(99, Number(el.textContent) + 1));
  }));
  document.querySelectorAll('.qty-dec').forEach(b => b.addEventListener('click', () => {
    const el = document.querySelector(`.qty[data-pid="${b.dataset.pid}"]`);
    el.textContent = String(Math.max(1, Number(el.textContent) - 1));
  }));
  document.querySelectorAll('.add-cart').forEach(b => b.addEventListener('click', async () => {
    const qty = Number(document.querySelector(`.qty[data-pid="${b.dataset.pid}"]`).textContent);
    try {
      await api('/api/cart/items', { method: 'POST', body: JSON.stringify({ productId: b.dataset.pid, quantity: qty }) });
      showToast('Səbətə əlavə edildi');
      window.dispatchEvent(new CustomEvent('ztopup:cart'));
    } catch (err) {
      showToast(err.message, 'bad');
    }
  }));
}

document.getElementById('searchInput').addEventListener('input', (e) => {
  const q = e.target.value.toLowerCase();
  const filtered = products.filter(p => (p.title || '').toLowerCase().includes(q) || (p.game || '').toLowerCase().includes(q));
  render(filtered, '');
});

loadCategory();
</script>
<script src="/footer.js" defer></script>
</body>
</html>
