<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PUBG Mobile Top-Up | ZELIX TOPUP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Orbitron:wght@700;800;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-black text-white">
  <header class="sticky top-0 z-40 border-b border-white/10 bg-black/70 backdrop-blur-2xl">
    <div class="mx-auto flex max-w-[1600px] items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
      <a href="/" class="flex items-center gap-3">
        <div class="h-10 w-10 rounded-xl bg-gradient-to-br from-amber-300 via-gold to-orange-500 text-black grid place-items-center font-orbitron font-black shadow-[0_0_22px_rgba(255,179,0,.42)]">Z</div>
        <span class="font-orbitron font-black text-gold tracking-[.14em]">ZELIX TOPUP</span>
      </a>
      <a href="/profile.html" class="rounded-2xl border border-gold/45 bg-gold/10 px-4 py-3 font-rajdhani text-sm font-black tracking-[.12em] text-gold shadow-[0_0_22px_rgba(255,179,0,.42)] transition hover:-translate-y-0.5 hover:bg-gradient-to-r hover:from-amber-300 hover:to-orange-500 hover:text-black sm:px-6">👤 Profil</a>
    </div>
  </header>

  <main class="relative z-10 mx-auto max-w-[1200px] px-4 py-6 sm:px-6 lg:px-8">
    <div class="mb-6 flex items-center justify-between">
      <h1 class="font-orbitron text-3xl font-black"><span class="text-gold">PUBG Mobile</span> Top-Up</h1>
      <div class="text-xs font-rajdhani font-black text-white/60">⚡ Real-time • 🛡 100% təhlükəsiz</div>
    </div>

    <div class="mb-6 grid grid-cols-1 gap-4 rounded-2xl border border-white/10 bg-white/[.03] p-4 sm:grid-cols-3">
      <div class="col-span-2 flex items-center gap-4">
        <img src="/assets/pubg-uc.png" alt="PUBG UC" class="h-14 w-14 rounded-xl border border-white/10 bg-white/[.06] p-1"/>
        <div>
          <div class="font-rajdhani text-sm font-black tracking-[.14em] text-white/70">MÖVCUDLUQ</div>
          <div id="availability" class="font-orbitron text-lg font-black text-emerald-300">Stokda</div>
        </div>
      </div>
      <div class="flex flex-col items-end justify-center">
        <div class="font-rajdhani text-xs font-black text-white/60">ÇATDIRILMA</div>
        <div id="delivery" class="font-orbitron text-lg font-black text-gold">~ 5 dəq</div>
      </div>
    </div>

    <div id="grid" class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3"></div>
  </main>

  <div id="orderModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/70 p-4 backdrop-blur">
    <div class="w-full max-w-md rounded-2xl border border-white/10 bg-white/[.04] p-5 shadow-[0_30px_80px_rgba(0,0,0,.55)]">
      <div class="mb-3 font-orbitron text-xl font-black text-gold">Sifariş</div>
      <form id="orderForm" class="space-y-3">
        <input type="hidden" name="productId"/>
        <div>
          <label class="mb-1 block font-rajdhani text-xs font-black text-white/70">PUBG User ID</label>
          <input name="playerId" class="w-full rounded-xl border border-white/10 bg-black/40 p-3 outline-none focus:border-gold" placeholder="1234567890" required />
        </div>
        <div>
          <label class="mb-1 block font-rajdhani text-xs font-black text-white/70">Email</label>
          <input name="email" type="email" class="w-full rounded-xl border border-white/10 bg-black/40 p-3 outline-none focus:border-gold" placeholder="example@mail.com" required />
        </div>
        <div>
          <label class="mb-1 block font-rajdhani text-xs font-black text-white/70">Miqdar</label>
          <input name="quantity" type="number" min="1" value="1" class="w-full rounded-xl border border-white/10 bg-black/40 p-3 outline-none focus:border-gold"/>
        </div>
        <div class="flex items-center justify-end gap-3 pt-2">
          <button type="button" id="closeOrder" class="rounded-xl border border-white/10 px-4 py-2 font-rajdhani text-sm font-black text-white/70">Ləğv et</button>
          <button type="submit" class="rounded-xl bg-gradient-to-r from-amber-300 via-gold to-orange-500 px-4 py-2 font-orbitron text-sm font-black text-black shadow-[0_0_22px_rgba(255,179,0,.42)]">TAMAMLA</button>
        </div>
      </form>
    </div>
  </div>

<script>
async function api(url, opts={}){
  const token = localStorage.getItem('zelixToken');
  const res = await fetch(url, { ...opts, headers: { 'Content-Type': 'application/json', ...(token?{Authorization:`Bearer ${token}`}:{}) } });
  const text = await res.text();
  let data = {};
  try{ data = text ? JSON.parse(text) : {}; }catch{ throw new Error('Server cavabı JSON deyil'); }
  if(!res.ok) throw new Error(data.message || 'Sorğu uğursuz oldu');
  return data;
}

async function loadProducts(){
  const { products } = await api('/api/products?game=pubg');
  const grid = document.getElementById('grid');
  grid.innerHTML = products.map(p=>`
    <div class="rounded-2xl border border-white/10 bg-white/[.03] p-4">
      <div class="flex items-center gap-3">
        <img src="${p.image_url || '/assets/pubg-uc.png'}" class="h-12 w-12 rounded-xl border border-white/10 bg-white/[.06] p-1"/>
        <div class="font-orbitron text-lg font-black">${p.title}</div>
      </div>
      <div class="mt-3 flex items-center justify-between">
        <div class="font-rajdhani text-sm font-black text-white/70">Qiymət</div>
        <div class="font-orbitron text-xl font-black text-gold">${Number(p.price).toFixed(2)} ₼</div>
      </div>
      <div class="mt-3 flex items-center justify-between">
        <div class="font-rajdhani text-sm font-black text-white/70">Mövcudluq</div>
        <div class="font-orbitron text-sm font-black ${p.available?'text-emerald-300':'text-red-300'}">${p.available?'Stokda':'Yoxdur'}</div>
      </div>
      <div class="mt-4 flex items-center justify-between">
        <div class="inline-flex items-center gap-2 rounded-xl border border-white/10 bg-black/30 px-2 py-1">
          <button class="qty-dec px-2">-</button>
          <span class="qty font-orbitron">1</span>
          <button class="qty-inc px-2">+</button>
        </div>
        <div class="flex items-center gap-2">
          <button class="add-cart rounded-xl border border-gold/45 bg-gold/10 px-3 py-2 font-rajdhani text-xs font-black text-gold">Səbətə at</button>
          <button class="buy-now rounded-xl bg-gradient-to-r from-amber-300 via-gold to-orange-500 px-3 py-2 font-rajdhani text-xs font-black text-black">İndi al</button>
        </div>
      </div>
      <input type="hidden" class="pid" value="${p.id}"/>
    </div>
  `).join('');

  document.querySelectorAll('#grid .qty-inc').forEach((b,i)=>b.addEventListener('click',()=>{
    const qty = b.parentElement.querySelector('.qty');
    qty.textContent = String(Number(qty.textContent)+1);
  }));
  document.querySelectorAll('#grid .qty-dec').forEach((b,i)=>b.addEventListener('click',()=>{
    const qty = b.parentElement.querySelector('.qty');
    qty.textContent = String(Math.max(1, Number(qty.textContent)-1));
  }));
  document.querySelectorAll('#grid .buy-now').forEach((b)=>b.addEventListener('click',()=>{
    const card = b.closest('div');
    const pid = card.querySelector('.pid').value;
    const qty = Number(card.querySelector('.qty').textContent);
    openOrder(pid, qty);
  }));
}

function openOrder(productId, quantity){
  const m = document.getElementById('orderModal');
  m.classList.remove('hidden');
  const f = document.getElementById('orderForm');
  f.productId.value = productId;
  f.quantity.value = quantity;
}

document.getElementById('closeOrder').addEventListener('click',()=>{
  document.getElementById('orderModal').classList.add('hidden');
});

document.getElementById('orderForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const form = new FormData(e.target);
  const payload = Object.fromEntries(form.entries());
  payload.quantity = Number(payload.quantity||1);
  try{
    const res = await api('/api/orders',{method:'POST', body: JSON.stringify(payload)});
    alert(res.message || 'Sifariş uğurludur');
    document.getElementById('orderModal').classList.add('hidden');
  }catch(err){
    alert(err.message);
  }
});

loadProducts();
</script>
</body>
</html>
