<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ZELIX TOPUP | Məhsullar</title>
  <link rel="icon" type="image/svg+xml" href="/assets/zelix-generated-logo.svg">
  <link rel="alternate icon" href="/assets/zelix-logo.png">
  <link rel="apple-touch-icon" href="/assets/zelix-logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Orbitron:wght@600;700;800;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared-background.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/header.js" defer></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            inter: ['Inter', 'sans-serif'],
            orbitron: ['Orbitron', 'sans-serif'],
            rajdhani: ['Rajdhani', 'sans-serif']
          },
          colors: {
            gold: '#ffb300',
            purple: '#8a2eff',
            blue: '#00c8ff'
          },
          boxShadow: {
            gold: '0 0 22px rgba(255,179,0,.42)',
            violet: '0 0 24px rgba(138,46,255,.38)',
            blue: '0 0 22px rgba(0,200,255,.3)'
          }
        }
      }
    }
  </script>
  <style>
    body { background:#050505; color:white; }
    .grid-bg { background-image:linear-gradient(rgba(255,255,255,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.045) 1px,transparent 1px); background-size:48px 48px; }
  </style>
<link rel="stylesheet" href="/responsive.css">
</head>
<body class="font-inter">
  <div class="particles">
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
  </div>

  <main class="relative min-h-[calc(100vh-64px)]">
    <div class="absolute inset-0 grid-bg opacity-20"></div>
    <section class="relative z-10 mx-auto max-w-[1400px] px-4 py-6 sm:px-6 lg:px-8">
      <div class="mb-6 inline-flex w-fit rounded-full border border-gold/25 bg-gold/10 px-4 py-2 font-rajdhani text-xs font-black tracking-[.2em] text-gold shadow-gold">KATALOQ</div>
      <h1 class="font-orbitron text-4xl font-black"><span class="bg-gradient-to-r from-amber-300 via-gold to-orange-500 bg-clip-text text-transparent">MƏHSULLAR</span></h1>
      <p class="mt-2 text-sm text-white/60">Seçilən oyunların top-up kateqoriyaları.</p>

      <div id="grid" class="mt-6 grid gap-4 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4"></div>
    </section>
  </main>

  <script>
    async function loadCategories(){
      const grid = document.getElementById('grid');
      grid.innerHTML = '<div class="col-span-full flex justify-center py-12"><div class="h-10 w-10 animate-spin rounded-full border-4 border-white/10 border-t-gold"></div></div>';
      try {
        const res = await fetch('/api/categories');
        const data = await res.json();
        const cats = data.categories || [];
        if (!cats.length) {
          grid.innerHTML = '<div class="col-span-full text-center py-12 text-white/60">Kateqoriya yoxdur</div>';
          return;
        }
        grid.innerHTML = cats.map(cat => {
          const slug = cat.slug || cat.name.toLowerCase().replace(/[^a-z0-9]+/g, '-');
          const img = cat.image_url || '/assets/zelix-generated-logo.svg';
          return `
            <a href="/category/${slug}" class="group relative overflow-hidden rounded-2xl border border-white/10 bg-[#101018] p-0 shadow-[0_18px_50px_rgba(0,0,0,.32)] transition hover:-translate-y-0.5 hover:border-gold/30">
              <div class="absolute inset-0 opacity-80" style="background: radial-gradient(circle at 50% 32%, rgba(255,179,0,.18), transparent 48%)"></div>
              <div class="relative z-10 grid h-44 place-items-center">
                <img src="${img}" alt="${cat.name}" class="max-h-28 w-auto object-contain transition group-hover:scale-105" loading="lazy" onerror="this.src='/assets/zelix-generated-logo.svg'"/>
              </div>
              <div class="relative z-10 flex items-center justify-between gap-3 border-t border-white/10 px-4 py-3">
                <div class="font-rajdhani text-sm font-black tracking-[.08em]">${cat.name}</div>
                <div class="grid h-8 w-8 place-items-center rounded-full bg-gradient-to-br from-amber-200 via-gold to-orange-500 text-black shadow-gold">›</div>
              </div>
            </a>
          `;
        }).join('');
      } catch (err) {
        document.getElementById('grid').innerHTML = '<div class="col-span-full text-center py-12 text-white/60">Kateqoriyalar yüklənə bilmədi</div>';
        console.error(err);
      }
    }
    loadCategories();
  </script>
  <script src="/footer.js" defer></script>
</body>
</html>
