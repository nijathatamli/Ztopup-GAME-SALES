<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ZELIX TOPUP | Məhsullar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Orbitron:wght@600;700;800;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            inter: ['Inter', 'sans-serif'],
            orbitron: ['Orbitron', 'sans-serif'],
            rajdhani: ['Rajdhani', 'sans-serif']
          },
          colors: {
            gold: '#ffb300',
            purple: '#8a2eff',
            blue: '#00c8ff'
          },
          boxShadow: {
            gold: '0 0 22px rgba(255,179,0,.42)',
            violet: '0 0 24px rgba(138,46,255,.38)',
            blue: '0 0 22px rgba(0,200,255,.3)'
          }
        }
      }
    }
  </script>
  <style>
    body { background:#050505; color:white; }
    .grid-bg { background-image:linear-gradient(rgba(255,255,255,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.045) 1px,transparent 1px); background-size:48px 48px; }
  </style>
</head>
<body class="font-inter">
  <header class="sticky top-0 z-40 border-b border-white/10 bg-black/70 backdrop-blur-2xl">
    <div class="mx-auto flex max-w-[1400px] items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
      <a href="/" class="flex items-center gap-3">
        <div class="grid h-11 w-11 place-items-center overflow-hidden rounded-2xl bg-gradient-to-br from-amber-200 via-gold to-orange-500 shadow-gold">
          <img class="h-[145%] w-[145%] object-cover drop-shadow-[0_0_10px_rgba(255,179,0,.55)]" src="assets/zelix-generated-logo.svg" alt="ZELIX TOPUP logo"/>
        </div>
        <div>
          <div class="font-orbitron text-lg font-black tracking-[.18em] text-gold sm:text-xl">ZELIX TOPUP</div>
          <div class="font-rajdhani text-[10px] font-bold tracking-[.32em] text-white/40">PREMIUM GAMING MARKET</div>
        </div>
      </a>
      <nav class="hidden gap-2 sm:flex">
        <a href="/" class="rounded-xl px-3 py-2 text-sm font-bold text-white/65 hover:bg-white/5 hover:text-white">Əsas</a>
        <a href="/mehsullar.html" class="rounded-xl px-3 py-2 text-sm font-bold text-gold bg-gold/10 border border-gold/30 shadow-gold">Məhsullar</a>
        <a href="/profile.html" class="rounded-xl px-3 py-2 text-sm font-bold text-white/65 hover:bg-white/5 hover:text-white">Profil</a>
      </nav>
    </div>
  </header>

  <main class="relative min-h-[calc(100vh-64px)]">
    <div class="absolute inset-0 grid-bg opacity-20"></div>
    <section class="relative z-10 mx-auto max-w-[1400px] px-4 py-6 sm:px-6 lg:px-8">
      <div class="mb-6 inline-flex w-fit rounded-full border border-gold/25 bg-gold/10 px-4 py-2 font-rajdhani text-xs font-black tracking-[.2em] text-gold shadow-gold">KATALOQ</div>
      <h1 class="font-orbitron text-4xl font-black"><span class="bg-gradient-to-r from-amber-300 via-gold to-orange-500 bg-clip-text text-transparent">MƏHSULLAR</span></h1>
      <p class="mt-2 text-sm text-white/60">Seçilən oyunların top-up kateqoriyaları.</p>

      <div id="grid" class="mt-6 grid gap-4 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4"></div>
    </section>
  </main>

  <script>
    const games = [
      {
        name: 'Free Fire',
        className: 'freefire',
        image: 'https://dl.dir.freefiremobile.com/common/web_event/official2/dist/client/img/full_logo.969f536.png'
      },
      {
        name: 'PUBG Mobile',
        className: 'pubg',
        image: 'https://cdn.cloudflare.steamstatic.com/steam/apps/578080/header.jpg'
      },
      {
        name: 'Brawl Stars',
        className: 'brawl',
        image: 'https://1000logos.net/wp-content/uploads/2021/02/Brawl-Stars-logo.png'
      },
      {
        name: 'Clash of Clans',
        className: 'coc',
        image: 'https://1000logos.net/wp-content/uploads/2021/02/Clash-of-Clans-logo.png'
      },
      {
        name: 'Clash Royale',
        className: 'royale',
        image: 'https://1000logos.net/wp-content/uploads/2021/04/Clash-Royale-logo.png'
      },
      {
        name: 'Roblox',
        className: 'roblox',
        image: 'https://1000logos.net/wp-content/uploads/2017/09/Roblox-Logo.png'
      },
      {
        name: 'eFootball',
        className: 'football',
        image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/e/ee/EFootball_logo.svg/330px-EFootball_logo.svg.png'
      },
      {
        name: 'Call of Duty',
        className: 'cod',
        image: 'https://1000logos.net/wp-content/uploads/2020/09/Call-of-Duty-Logo.png'
      }
    ];

    const grid = document.getElementById('grid');
    grid.innerHTML = games.map(game => `
      <a href="#" class="group relative overflow-hidden rounded-2xl border border-white/10 bg-[#101018] p-0 shadow-[0_18px_50px_rgba(0,0,0,.32)] transition hover:-translate-y-0.5 hover:border-gold/30">
        <div class="absolute inset-0 opacity-80" style="background: radial-gradient(circle at 50% 32%, rgba(255,179,0,.18), transparent 48%)"></div>
        <div class="relative z-10 grid h-44 place-items-center">
          <img src="${game.image}" alt="${game.name}" class="max-h-28 w-auto object-contain transition group-hover:scale-105" loading="lazy"/>
        </div>
        <div class="relative z-10 flex items-center justify-between gap-3 border-t border-white/10 px-4 py-3">
          <div class="font-rajdhani text-sm font-black tracking-[.08em]">${game.name}</div>
          <div class="grid h-8 w-8 place-items-center rounded-full bg-gradient-to-br from-amber-200 via-gold to-orange-500 text-black shadow-gold">›</div>
        </div>
      </a>
    `).join('');
  </script>
</body>
</html>
