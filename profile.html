async function apiRequest(url, options = {}) {
  const token = localStorage.getItem('zelixToken');
  const response = await fetch(url, {
    ...options,
    headers: {
      'Content-Type': 'application/json',
      ...(token ? { Authorization: `Bearer ${token}` } : {}),
      ...(options.headers || {})
    }
  });
  const data = await response.json();
  if (!response.ok) throw new Error(data.message || 'Sorğu uğursuz oldu.');
  return data;
}

function ProfileForm({profile,onSave,message}){
  const [form,setForm]=React.useState({firstName:profile.firstName,lastName:profile.lastName,phone:profile.phone,email:profile.email,username:profile.username,password:'',confirmPassword:''});
  React.useEffect(()=>setForm({firstName:profile.firstName,lastName:profile.lastName,phone:profile.phone,email:profile.email,username:profile.username,password:'',confirmPassword:''}),[profile]);
  function update(name,value){setForm({...form,[name]:value})}
  function submit(){onSave(form)}
  return <section className="glass rounded-[2rem] p-6 shadow-[0_22px_70px_rgba(0,0,0,.42)] sm:p-7">
    <h2 className="font-orbitron text-2xl font-black text-gold">Şəxsi məlumatlar</h2>
    <p className="mt-2 text-sm text-white/55">Hesab məlumatlarınızı burada yeniləyə bilərsiniz.</p>
    <div className="mt-7 grid gap-5 md:grid-cols-2">
      <Input icon="✨" label="Ad" value={form.firstName} onChange={v=>update('firstName',v)}/>
      <Input icon="⚡" label="Soyad" value={form.lastName} onChange={v=>update('lastName',v)}/>
      <Input icon="📱" label="Nömrə" value={form.phone} onChange={v=>update('phone',v)}/>
      <Input icon="✉️" label="Email" value={form.email} onChange={v=>update('email',v)}/>
      <Input icon="🎮" label="İstifadəçi adı" value={form.username} onChange={v=>update('username',v)}/>
      <Input icon="🔒" label="Şifrə" value={form.password} type="password" onChange={v=>update('password',v)}/>
      <Input icon="🛡" label="Şifrəni təkrarla" value={form.confirmPassword} type="password" onChange={v=>update('confirmPassword',v)}/>
    </div>
    <button onClick={submit} className="mt-7 w-full rounded-2xl bg-gradient-to-r from-amber-300 via-gold to-orange-500 px-5 py-4 font-orbitron text-sm font-black tracking-[.14em] text-black shadow-[0_14px_34px_rgba(255,179,0,.32)] transition hover:-translate-y-1 hover:shadow-gold">DƏYİŞİKLİKLƏRİ YADDA SAXLA</button>
    {message&&<div className={`mt-4 rounded-2xl border px-4 py-3 text-sm font-bold ${message.type==='bad'?'border-red-400/30 bg-red-500/10 text-red-200':'border-emerald-400/30 bg-emerald-500/10 text-emerald-200'}`}>{message.text}</div>}
  </section>
}

      <span className="text-lg opacity-75">{icon}</span>
      <input className="w-full bg-transparent text-sm font-bold text-white outline-none placeholder:text-white/30" value={value} type={isPass && !visible ? 'password':'text'} onChange={e=>onChange(e.target.value)}/>
      {isPass && <button type="button" onClick={()=>setVisible(!visible)} className="rounded-xl px-2 py-1 text-sm text-gold hover:bg-white/10">👁</button>}
    </div>
  </label>
}

function App(){
  const fallbackProfile={username:'ZelixPlayer',firstName:'Elvin',lastName:'Əliyev',email:'elvin.aliyev@example.com',phone:'+994 50 123 45 67',memberId:'#ZLX10023',title:'Zelix ailəsinin fəal üzvü',joinedAt:'15.03.2025',level:25,xp:12450,nextXp:20000,zelixBalance:1250,mapBalance:5600};
  const [profile,setProfile]=React.useState(fallbackProfile);
  const [message,setMessage]=React.useState(null);
  const [showProducts,setShowProducts]=React.useState(false);
  const [loggingOut,setLoggingOut]=React.useState(false);
  const games=[
    {name:'Free Fire',image:'https://dl.dir.freefiremobile.com/common/web_event/official2/dist/client/img/full_logo.969f536.png'},
    {name:'PUBG Mobile',image:'https://cdn.cloudflare.steamstatic.com/steam/apps/578080/header.jpg'},
    {name:'Brawl Stars',image:'https://1000logos.net/wp-content/uploads/2021/02/Brawl-Stars-logo.png'},
    {name:'Clash of Clans',image:'https://1000logos.net/wp-content/uploads/2021/02/Clash-of-Clans-logo.png'},
    {name:'Clash Royale',image:'https://1000logos.net/wp-content/uploads/2021/04/Clash-Royale-logo.png'},
    {name:'Roblox',image:'https://1000logos.net/wp-content/uploads/2017/09/Roblox-Logo.png'},
    {name:'eFootball',image:'https://upload.wikimedia.org/wikipedia/commons/thumb/e/ee/EFootball_logo.svg/330px-EFootball_logo.svg.png'},
    {name:'Call of Duty',image:'https://1000logos.net/wp-content/uploads/2020/09/Call-of-Duty-Logo.png'}
  ];
  const [selected,setSelected]=React.useState([]);
  function toggle(name){ setSelected(prev=> prev.includes(name) ? prev.filter(n=>n!==name) : [...prev,name]); }
  React.useEffect(()=>{apiRequest('/api/profile').then(data=>setProfile(data.profile)).catch(()=>setMessage({type:'bad',text:'Profil məlumatları üçün daxil olmaq lazımdır.'}))},[]);
  async function action(url,body){
    try{
      const data=await apiRequest(url,{method:'POST',body:JSON.stringify(body)});
      if(data.profile)setProfile(data.profile);
      setMessage({type:'ok',text:data.message});
    }catch(error){setMessage({type:'bad',text:error.message})}
  }
  async function saveProfile(form){
    await action('/api/profile',form);
    if(form.password || form.confirmPassword) await action('/api/password',{password:form.password,confirmPassword:form.confirmPassword});
  }
  async function logout(){
    setLoggingOut(true);
    try{await apiRequest('/api/logout',{method:'POST',body:'{}'});}catch{}
    localStorage.removeItem('zelixToken');
    localStorage.removeItem('zelixUser');
    location.href='/login-v2.html';
  }
  return <main className="relative min-h-screen bg-black text-white">
    <div className="fixed inset-0 grid-bg opacity-20"></div>
    <div className="fixed left-[-12rem] top-[-12rem] h-[34rem] w-[34rem] rounded-full bg-violet/25 blur-3xl"></div>
    <div className="fixed bottom-[-12rem] right-[-12rem] h-[36rem] w-[36rem] rounded-full bg-gold/15 blur-3xl"></div>
    <Topbar/>
    <div className="relative z-10 mx-auto grid max-w-[1600px] gap-6 px-4 py-6 sm:px-6 lg:grid-cols-[320px_1fr] lg:px-8">
      <Sidebar profile={profile} onAction={action} onLogout={logout} onShowProducts={setShowProducts} showProducts={showProducts} loggingOut={loggingOut}/>
      <div className="space-y-6">
        {showProducts ? (
          <ProductsPanel games={games} selected={selected} onToggle={toggle}/>
        ) : (
          <>
            <Hero/>
            <Overview profile={profile}/>
            <Tabs/>
            <ProfileForm profile={profile} onSave={saveProfile} message={message}/>
            <StatGrid/>
          </>
        )}
        <Footer/>
      </div>
    </div>
  </main>
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
