</script>

async function apiRequest(url, options = {}) {
  const token = localStorage.getItem('zelixToken');
  const response = await fetch(url, {
    ...options,
    credentials: 'same-origin', // send the HttpOnly auth cookie
    headers: {
      'Content-Type': 'application/json',
      ...(token ? { Authorization: `Bearer ${token}` } : {}),
      ...(options.headers || {})
    }
  });
  const data = await response.json();
  if (!response.ok) throw new Error(data.message || 'Sorğu uğursuz oldu.');
  return data;
}

function OrdersPanel(){
  const [orders,setOrders]=React.useState([]);
  const [loading,setLoading]=React.useState(true);
  const [error,setError]=React.useState('');
  const [syncedAt,setSyncedAt]=React.useState(null);

  const loadOrders = React.useCallback(() => {
    apiRequest('/api/orders')
      .then(d => { setOrders(d.orders || []); setSyncedAt(new Date()); setError(''); })
      .catch(e => setError(e.message || 'Sifarişlər yüklənmədi'))
      .finally(() => setLoading(false));
  }, []);

  React.useEffect(() => {
    loadOrders();
    const token = localStorage.getItem('zelixToken');
    if (!token) return;
    const es = new EventSource('/api/stream?token=' + encodeURIComponent(token));
    es.addEventListener('order', (e) => {
      try {
        const data = JSON.parse(e.data);
        const updated = data.order;
        if (!updated) return;
        setOrders(prev => {
          const idx = prev.findIndex(o => o.id === updated.id);
          if (idx >= 0) {
            const next = [...prev];
            next[idx] = updated;
            return next;
          }
          return [updated, ...prev];
        });
        setSyncedAt(new Date());
      } catch (err) {}
    });
    es.addEventListener('state', () => {
      loadOrders();
    });
    es.onerror = () => {};
    return () => { es.close(); };
  }, [loadOrders]);

  const statusClass = (code) => {
    const c = String(code || '').toLowerCase();
    if (c === 'completed') return 'bg-emerald-500/15 text-emerald-300 border border-emerald-400/25';
    if (c === 'rejected') return 'bg-red-500/15 text-red-300 border border-red-400/25';
    if (c === 'processing') return 'bg-blue-500/15 text-blue-300 border border-blue-400/25';
    return 'bg-yellow-500/10 text-amber-300 border border-amber-400/25';
  };
  const statusText = (o) => o.status_label || o.status || o.status_code || 'Gözləmədə';
  const totalAmount = (o) => Number(o.total_amount || o.price || 0).toFixed(2);
  const itemNames = (o) => (o.items || []).map(i => `${i.title} x${i.quantity}`).join(', ');

  return <section className="glass rounded-[2rem] p-5 shadow-[0_30px_80px_rgba(0,0,0,.55)]">
    <div className="mb-4 flex items-center justify-between">
      <h3 className="font-orbitron text-xl font-black">Sifarişlərim</h3>
      <div className="flex items-center gap-2">
        {syncedAt && <span className="text-[11px] text-white/40">Sinx: {syncedAt.toLocaleTimeString()}</span>}
        <span className="rounded-full border border-violet/30 bg-violet/10 px-3 py-1 font-rajdhani text-xs font-black tracking-[.16em] text-violet">Canlı</span>
      </div>
    </div>
    {loading && <div className="mb-3 text-sm text-white/60">Yüklənir...</div>}
    {error && <div className="mb-3 rounded-xl border border-red-500/30 bg-red-500/10 p-3 text-sm text-red-200">{error}</div>}
    <div className="grid gap-3">
      {orders.length===0 && !loading ? (
        <div className="rounded-xl border border-white/10 bg-white/[.03] p-4 text-sm text-white/60">Hələ sifariş yoxdur.</div>
      ) : orders.map(o=>
        <div key={o.id} className="rounded-2xl border border-white/10 bg-white/[.03] p-4">
          <div className="flex flex-wrap items-center justify-between gap-3">
            <div className="font-orbitron text-lg font-black">{o.game || (o.items && o.items[0] && o.items[0].game) || 'Oyun'} <span className="text-sm text-white/50">({itemNames(o) || o.package})</span></div>
            <div className={`${statusClass(o.status_code)} rounded-full px-3 py-1 text-xs font-rajdhani font-black`}>{statusText(o)}</div>
          </div>
          <div className="mt-2 grid grid-cols-2 gap-2 text-sm text-white/70 sm:grid-cols-4">
            <div>Cəmi: <span className="font-orbitron text-gold">{totalAmount(o)} ₼</span></div>
            <div>Miqdar: <span className="font-orbitron">{(o.items || []).reduce((s,i)=>s+i.quantity,0) || o.quantity || 1}</span></div>
            <div>ID: <span className="font-orbitron">{o.player_id||'—'}</span></div>
            <div>Tarix: <span className="font-orbitron">{String(o.updated_at || o.created_at || '').slice(0,19).replace('T',' ')}</span></div>
          </div>
        </div>
      )}
    </div>
  </section>
}

function statusBadge(status){
  const s=String(status||'').toLowerCase();
  if(s==='approved') return 'bg-emerald-500/15 text-emerald-300 border border-emerald-400/25';
  if(s==='rejected') return 'bg-red-500/15 text-red-300 border border-red-400/25';
  return 'bg-yellow-500/10 text-amber-300 border border-amber-400/25';
}
function statusLabel(status){
  const s=String(status||'').toLowerCase();
  if(s==='approved') return 'Təsdiqləndi';
  if(s==='rejected') return 'Rədd edildi';
  return 'Gözləyir';
}

function DepositPanel(){
  const [amount,setAmount]=React.useState('');
  const [file,setFile]=React.useState(null);
  const [busy,setBusy]=React.useState(false);
  const [msg,setMsg]=React.useState(null);
  const [deposits,setDeposits]=React.useState([]);
  const fileRef=React.useRef(null);

  function load(){
    apiRequest('/api/deposits').then(d=>setDeposits(d.deposits||[])).catch(()=>{});
  }
  React.useEffect(load,[]);

  async function submit(e){
    e.preventDefault();
    setMsg(null);
    if(!file){ setMsg({type:'bad',text:'Zəhmət olmasa qəbz şəklini seçin.'}); return; }
    const okType=['image/jpeg','image/png'].includes(file.type);
    if(!okType){ setMsg({type:'bad',text:'Yalnız JPG və ya PNG faylları qəbul olunur.'}); return; }
    if(file.size>5*1024*1024){ setMsg({type:'bad',text:'Fayl 5MB-dan böyük ola bilməz.'}); return; }
    setBusy(true);
    try{
      const token=localStorage.getItem('zelixToken');
      const fd=new FormData();
      if(amount) fd.append('amount',amount);
      fd.append('receipt',file);
      const res=await fetch('/api/deposits',{method:'POST',credentials:'same-origin',headers:token?{Authorization:`Bearer ${token}`}:{},body:fd});
      const data=await res.json();
      if(!res.ok) throw new Error(data.message||'Yükləmə uğursuz oldu.');
      setMsg({type:'ok',text:data.message});
      setAmount(''); setFile(null); if(fileRef.current) fileRef.current.value='';
      load();
    }catch(err){ setMsg({type:'bad',text:err.message}); }
    finally{ setBusy(false); }
  }

  return <section className="glass rounded-[2rem] p-5 shadow-[0_30px_80px_rgba(0,0,0,.55)] sm:p-7">
    <div className="mb-4 flex items-center justify-between">
      <h3 className="font-orbitron text-xl font-black text-gold">Balans Artırma (Depozit)</h3>
      <span className="rounded-full border border-violet/30 bg-violet/10 px-3 py-1 font-rajdhani text-xs font-black tracking-[.16em] text-violet">Qəbz Yüklə</span>
    </div>
    <p className="mb-5 text-sm text-white/55">Ödəniş qəbzinizi yükləyin. Admin təsdiqlədikdən sonra balansınız artırılacaq. (JPG/PNG, maksimum 5MB)</p>
    <form onSubmit={submit} className="grid gap-4 sm:grid-cols-[1fr_1.4fr_auto] sm:items-end">
      <label className="block">
        <span className="mb-2 block font-rajdhani text-sm font-black tracking-[.12em] text-white/58">Məbləğ (₼, istəyə bağlı)</span>
        <input type="number" step="0.01" min="0" value={amount} onChange={e=>setAmount(e.target.value)} placeholder="məs. 50"
          className="h-14 w-full rounded-2xl border border-white/10 bg-black/35 px-4 text-sm font-bold text-white outline-none transition focus:border-blue focus:shadow-blue placeholder:text-white/30"/>
      </label>
      <label className="block">
        <span className="mb-2 block font-rajdhani text-sm font-black tracking-[.12em] text-white/58">Qəbz şəkli (JPG/PNG)</span>
        <input ref={fileRef} type="file" accept="image/jpeg,image/png,.jpg,.jpeg,.png" onChange={e=>setFile(e.target.files[0]||null)}
          className="h-14 w-full rounded-2xl border border-white/10 bg-black/35 px-3 py-3 text-sm text-white/70 outline-none file:mr-3 file:rounded-xl file:border-0 file:bg-gold/20 file:px-4 file:py-2 file:font-rajdhani file:font-black file:text-gold"/>
      </label>
      <button type="submit" disabled={busy}
        className={`h-14 rounded-2xl bg-gradient-to-r from-amber-300 via-gold to-orange-500 px-6 font-orbitron text-sm font-black tracking-[.14em] text-black shadow-gold transition hover:-translate-y-1 ${busy?'opacity-60 cursor-wait':''}`}>{busy?'YÜKLƏNİR...':'GÖNDƏR'}</button>
    </form>
    {msg&&<div className={`mt-4 rounded-2xl border px-4 py-3 text-sm font-bold ${msg.type==='bad'?'border-red-400/30 bg-red-500/10 text-red-200':'border-emerald-400/30 bg-emerald-500/10 text-emerald-200'}`}>{msg.text}</div>}

    <div className="mt-6">
      <h4 className="mb-3 font-rajdhani text-sm font-black tracking-[.16em] text-white/55">SORĞULARIM</h4>
      <div className="grid gap-3">
        {deposits.length===0 ? (
          <div className="rounded-xl border border-white/10 bg-white/[.03] p-4 text-sm text-white/60">Hələ depozit sorğusu yoxdur.</div>
        ) : deposits.map(d=>
          <div key={d.id} className="flex flex-wrap items-center gap-4 rounded-2xl border border-white/10 bg-white/[.03] p-4">
            <a href={`/uploads/receipts/${d.receipt_image}`} target="_blank" rel="noreferrer">
              <img src={`/uploads/receipts/${d.receipt_image}`} alt="qəbz" className="h-16 w-16 rounded-xl border border-white/10 object-cover"/>
            </a>
            <div className="flex-1">
              <div className="font-orbitron text-sm font-black text-gold">{Number(d.requested_amount||0).toFixed(2)} ₼</div>
              <div className="text-xs text-white/45">{String(d.created_at||'').slice(0,19).replace('T',' ')}</div>
              {d.admin_note&&<div className="mt-1 text-xs text-white/60">Qeyd: {d.admin_note}</div>}
            </div>
            <span className={`rounded-full px-3 py-1 text-xs font-rajdhani font-black ${statusBadge(d.status)}`}>{statusLabel(d.status)}</span>
          </div>
        )}
      </div>
    </div>
  </section>
}

function Footer(){
  return <footer className="mt-auto flex flex-col items-center justify-between gap-4 border-t border-white/10 py-6 text-sm text-white/45 md:flex-row">
    <div>© 2025 ZELIX TOPUP. Bütün hüquqlar qorunur.</div>
    <div className="flex gap-3"><a className="grid h-10 w-10 place-items-center rounded-xl border border-white/10 bg-white/[.04] transition hover:border-blue/40 hover:text-blue" href="#">f</a><a className="grid h-10 w-10 place-items-center rounded-xl border border-white/10 bg-white/[.04] transition hover:border-pink-400/40 hover:text-pink-300" href="#">◎</a><a className="grid h-10 w-10 place-items-center rounded-xl border border-white/10 bg-white/[.04] transition hover:border-red-400/40 hover:text-red-300" href="#">▶</a><a className="grid h-10 w-10 place-items-center rounded-xl border border-white/10 bg-white/[.04] transition hover:border-violet/40 hover:text-violet" href="#">⌁</a></div>
  </footer>
}

function App(){
  const fallbackProfile={username:'ZelixPlayer',firstName:'Elvin',lastName:'Əliyev',email:'elvin.aliyev@example.com',phone:'+994 50 123 45 67',memberId:'#ZLX10023',title:'Zelix ailəsinin fəal üzvü',joinedAt:'15.03.2025',level:25,xp:12450,nextXp:20000,zelixBalance:1250,mapBalance:5600};
  const [profile,setProfile]=React.useState(fallbackProfile);
  const [message,setMessage]=React.useState(null);
  const [showProducts,setShowProducts]=React.useState(false);
  const [showDeposit,setShowDeposit]=React.useState(false);
  const [loggingOut,setLoggingOut]=React.useState(false);
  const [categories,setCategories]=React.useState([]);
  React.useEffect(()=>{
    apiRequest('/api/categories').then(d=>setCategories(d.categories||[])).catch(()=>setCategories([]));
  },[]);
  const [selected,setSelected]=React.useState([]);
  function toggle(name){ setSelected(prev=> prev.includes(name) ? prev.filter(n=>n!==name) : [...prev,name]); }
  React.useEffect(()=>{apiRequest('/api/profile').then(data=>setProfile(data.profile)).catch(()=>setMessage({type:'bad',text:'Profil məlumatları üçün daxil olmaq lazımdır.'}))},[]);
  React.useEffect(()=>{
    if(window.location.pathname==='/balance/topup'||window.location.pathname==='/balance/topup/'){
      setShowProducts(false); setShowDeposit(true);
    }
  },[]);
  async function action(url,body){
    try{
      const data=await apiRequest(url,{method:'POST',body:JSON.stringify(body)});
      if(data.profile)setProfile(data.profile);
      setMessage({type:'ok',text:data.message});
    }catch(error){setMessage({type:'bad',text:error.message})}
  }
  async function saveProfile(form){
    await action('/api/profile',form);
    if(form.password || form.confirmPassword) await action('/api/password',{password:form.password,confirmPassword:form.confirmPassword});
  }
  async function logout(){
    if(loggingOut)return; // prevent multiple clicks while in progress
    setLoggingOut(true);
    setMessage(null);
    try{
      const res=await fetch('/api/logout',{
        method:'POST',
        credentials:'same-origin',
        headers:{'Content-Type':'application/json',...(localStorage.getItem('zelixToken')?{Authorization:`Bearer ${localStorage.getItem('zelixToken')}`}:{})},
        body:'{}'
      });
      const data=await res.json().catch(()=>({}));
      if(!res.ok||data.success===false){
        throw new Error(data.message||'Çıxış uğursuz oldu. Yenidən cəhd edin.');
      }
      // Success: clear client state then redirect.
      localStorage.removeItem('zelixToken');
      localStorage.removeItem('zelixUser');
      location.href='/login-v2.html';
    }catch(error){
      // Failure: show error and restore button state.
      setMessage({type:'bad',text:error.message||'Çıxış zamanı xəta baş verdi.'});
      setLoggingOut(false);
    }
  }
  return <main className="relative flex min-h-screen flex-col bg-black text-white">
    <div className="fixed inset-0 grid-bg opacity-20"></div>
    <div className="fixed left-[-12rem] top-[-12rem] h-[34rem] w-[34rem] rounded-full bg-violet/25 blur-3xl"></div>
    <div className="fixed bottom-[-12rem] right-[-12rem] h-[36rem] w-[36rem] rounded-full bg-gold/15 blur-3xl"></div>
    {message && <div className={`fixed right-4 top-4 z-50 rounded-2xl border px-4 py-3 text-sm font-bold shadow-lg ${message.type==='bad'?'border-red-400/40 bg-red-500/15 text-red-200':'border-emerald-400/40 bg-emerald-500/15 text-emerald-200'}`}>{message.text}</div>}
    <div className="relative z-10 mx-auto flex w-full max-w-[1600px] flex-1 flex-col gap-6 px-4 py-6 sm:px-6 lg:flex-row lg:px-8">
      <Sidebar profile={profile} onAction={action} onLogout={logout} onShowProducts={(v)=>{setShowDeposit(false);setShowProducts(v);}} onShowDeposit={()=>{setShowProducts(false);setShowDeposit(true);}} showProducts={showProducts} showDeposit={showDeposit} loggingOut={loggingOut}/>
      <div className="flex flex-1 flex-col space-y-6">
        {showProducts ? (
          <ProductsPanel categories={categories} selected={selected} onToggle={toggle}/>
        ) : showDeposit ? (
          <>
            <Hero/>
            <DepositPanel/>
          </>
        ) : (
          <>
            <Hero/>
            <Overview profile={profile}/>
            <Tabs/>
            <ProfileForm profile={profile} onSave={saveProfile} message={message}/>
            <StatGrid/>
            <OrdersPanel/>
          </>
        )}
        <Footer/>
      </div>
    </div>
  </main>
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
