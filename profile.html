<script>
  window.__panel=function(title,detail){var r=document.getElementById('root')||document.body;r.innerHTML='<div style="max-width:600px;margin:12vh auto;padding:28px;border:1px solid #f87171;border-radius:18px;background:#1a0c0c;color:#fecaca;font-family:Inter,Arial,sans-serif;text-align:center"><h2 style="color:#ffb300;font-weight:900;margin:0 0 10px">'+title+'</h2><p style="line-height:1.6;margin:0 0 8px">'+detail+'</p><p style="line-height:1.6;margin:14px 0 0;color:#fca5a5">İnternet bağlantınızı yoxlayın və səhifəni yeniləyin.</p></div>';};
  window.__cdnError=function(n){window.__panel('Səhifə yüklənə bilmədi','Lazımi resurs yüklənmədi: <b>'+n+'</b> (CDN bloklanmış ola bilər).');};
  window.addEventListener('error',function(ev){var r=document.getElementById('root');if(ev&&ev.message&&r&&r.children.length===0){window.__panel('Səhifədə xəta baş verdi','<code style="color:#fca5a5">'+String(ev.message)+'</code>');}});
  window.addEventListener('load',function(){setTimeout(function(){var r=document.getElementById('root');if(r&&r.children.length===0){if(typeof React==='undefined'||typeof ReactDOM==='undefined'){window.__cdnError('React/ReactDOM');}else if(!(window.Babel)){window.__cdnError('Babel');}}},2500);});
</script>

<body>
<div id="root"></div>
<script type="text/babel">
const formatMoney = (n, currency='₼') => Number(n || 0).toFixed(2) + ' ' + currency;
const formatDate = (d) => {
  if (!d) return '—';
  const dt = new Date(d);
  if (Number.isNaN(dt.getTime())) return String(d).slice(0, 19).replace('T', ' ');
  return dt.toLocaleString('az-AZ', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
};
const formatDateShort = (d) => {
  if (!d) return '—';
  const dt = new Date(d);
  if (Number.isNaN(dt.getTime())) return String(d).slice(0, 10);
  return dt.toLocaleDateString('az-AZ', { day: '2-digit', month: '2-digit', year: 'numeric' });
};
function copyText(text) { return navigator.clipboard.writeText(text); }

async function apiRequest(url, options = {}) {
  const token = localStorage.getItem('zelixToken');
  const response = await fetch(url, {
    ...options,
    credentials: 'same-origin',
    headers: { 'Content-Type': 'application/json', ...(token ? { Authorization: `Bearer ${token}` } : {}), ...(options.headers || {}) }
  });
  const data = await response.json();
  if (!response.ok) throw new Error(data.message || 'Sorğu uğursuz oldu.');
  return data;
}

const sidebarItems = [
  ['dashboard', '⌂', 'Əsas panel'],
  ['orders', '🛒', 'Sifarişlərim'],
  ['deposit', '💳', 'Balans yüklə'],
  ['transactions', '↯', 'Əməliyyatlar'],
  ['coupons', '🏷', 'Kuponlarım'],
  ['statistics', '📊', 'Statistika'],
  ['settings', '⚙', 'Tənzimləmələr'],
  ['membership', '👑', 'Üzvlük'],
  ['messages', '✉', 'Bildirişlər']
];

const statusBadgeClasses = {
  pending: 'bg-yellow-500/10 text-amber-300 border border-amber-400/25',
  processing: 'bg-blue-500/15 text-blue-300 border border-blue-400/25',
  completed: 'bg-emerald-500/15 text-emerald-300 border border-emerald-400/25',
  rejected: 'bg-red-500/15 text-red-300 border border-red-400/25',
  approved: 'bg-emerald-500/15 text-emerald-300 border border-emerald-400/25'
};
function statusClass(code) { return statusBadgeClasses[String(code || '').toLowerCase()] || statusBadgeClasses.pending; }
function statusLabel(code) {
  const c = String(code || '').toLowerCase();
  if (c === 'completed' || c === 'approved') return 'Tamamlandı';
  if (c === 'rejected') return 'Rədd edildi';
  if (c === 'processing') return 'Emal edilir';
  return 'Gözləmədə';
}

function Logo() {
  return <a href="/" className="flex items-center gap-3">
    <div className="grid h-12 w-12 place-items-center overflow-hidden rounded-2xl bg-gradient-to-br from-amber-200 via-gold to-orange-500 shadow-gold">
      <img className="h-[145%] w-[145%] object-cover drop-shadow-[0_0_10px_rgba(255,179,0,.55)]" src="assets/zelix-generated-logo.svg" alt="ZELIX TOPUP logo"/>
    </div>
    <div>
      <div className="font-orbitron text-lg font-black tracking-[.18em] text-gold sm:text-xl">ZELIX TOPUP</div>
      <div className="font-rajdhani text-[10px] font-bold tracking-[.32em] text-white/40">PREMIUM GAMING MARKET</div>
    </div>
  </a>;
}

function Avatar({ size = 'h-24 w-24', ring = 'border-violet' }) {
  return <div className={`${size} grid place-items-center overflow-hidden rounded-full border-2 ${ring} bg-black shadow-violet`}>
    <img className="h-[150%] w-[150%] object-cover" src="assets/zelix-generated-logo.svg" alt="Zelix avatar"/>
  </div>;
}

function useSSE() {
  const [connected, setConnected] = React.useState(false);
  const [tick, setTick] = React.useState(0);
  React.useEffect(() => {
    const token = localStorage.getItem('zelixToken');
    if (!token) return;
    const es = new EventSource('/api/stream?token=' + encodeURIComponent(token));
    es.onopen = () => setConnected(true);
    es.onerror = () => setConnected(false);
    es.addEventListener('state', () => setTick(t => t + 1));
    es.addEventListener('order', () => setTick(t => t + 1));
    es.addEventListener('notification', () => setTick(t => t + 1));
    return () => es.close();
  }, []);
  return { connected, tick };
}

function useFetch(url, deps = []) {
  const [data, setData] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  const [error, setError] = React.useState('');
  const load = React.useCallback(() => {
    setLoading(true);
    apiRequest(url).then(d => { setData(d); setError(''); })
      .catch(e => setError(e.message || 'Məlumatlar yüklənmədi'))
      .finally(() => setLoading(false));
  }, [url]);
  React.useEffect(() => { load(); }, [load]);
  return { data, loading, error, reload: load };
}

function Input({ icon, label, value, type = 'text', onChange }) {
  const [visible, setVisible] = React.useState(false);
  const isPass = type === 'password';
  return <label className="group block">
    <span className="mb-2 block font-rajdhani text-sm font-black tracking-[.12em] text-white/58">{label}</span>
    <div className="flex h-16 items-center gap-3 rounded-2xl border border-white/10 bg-black/35 px-4 transition group-hover:border-gold/25 group-focus-within:border-blue group-focus-within:shadow-blue">
      <span className="text-lg opacity-75">{icon}</span>
      <input className="w-full bg-transparent text-sm font-bold text-white outline-none placeholder:text-white/30" value={value} type={isPass && !visible ? 'password' : 'text'} onChange={e => onChange(e.target.value)}/>
      {isPass && <button type="button" onClick={() => setVisible(!visible)} className="rounded-xl px-2 py-1 text-sm text-gold hover:bg-white/10">👁</button>}
    </div>
  </label>;
}

function Footer() {
  return <footer className="mt-auto flex flex-col items-center justify-between gap-4 border-t border-white/10 py-6 text-sm text-white/45 md:flex-row">
    <div>© 2025 ZELIX TOPUP. Bütün hüquqlar qorunur.</div>
    <div className="flex gap-3"><a className="grid h-10 w-10 place-items-center rounded-xl border border-white/10 bg-white/[.04] transition hover:border-blue/40 hover:text-blue" href="#">f</a><a className="grid h-10 w-10 place-items-center rounded-xl border border-white/10 bg-white/[.04] transition hover:border-pink-400/40 hover:text-pink-300" href="#">◎</a><a className="grid h-10 w-10 place-items-center rounded-xl border border-white/10 bg-white/[.04] transition hover:border-red-400/40 hover:text-red-300" href="#">▶</a><a className="grid h-10 w-10 place-items-center rounded-xl border border-white/10 bg-white/[.04] transition hover:border-violet/40 hover:text-violet" href="#">⌁</a></div>
  </footer>;
}

function Sidebar({ active, profile, onNavigate, onLogout, counts }) {
  const ring = profile.membershipLevel === 'premium' ? 'border-gold' : profile.membershipLevel === 'vip' ? 'border-blue' : 'border-violet';
  const badgeClass = profile.membershipLevel === 'premium' ? 'border-gold/40 bg-gold/15 text-gold' : profile.membershipLevel === 'vip' ? 'border-blue/40 bg-blue/15 text-blue' : 'border-violet/40 bg-violet/15 text-violet';
  return <aside className="glass flex h-fit flex-col rounded-[2rem] p-5 shadow-[0_30px_80px_rgba(0,0,0,.55)] lg:sticky lg:top-24 lg:w-80">
    <div className="flex flex-col items-center text-center">
      <Avatar size="h-24 w-24" ring={ring}/>
      <h2 className="mt-4 font-orbitron text-xl font-black">{profile.username || 'ZelixPlayer'}</h2>
      <span className={`mt-2 rounded-full border px-3 py-1 font-rajdhani text-xs font-black tracking-[.16em] ${badgeClass}`}>{profile.membershipLabel || 'Standard'} ÜZV</span>
    </div>
    <div className="mt-6 grid gap-3">
      <div className="rounded-2xl border border-white/10 bg-white/[.045] p-4 transition hover:border-gold/30 hover:shadow-gold">
        <div className="flex items-center gap-3">
          <div className="grid h-11 w-11 place-items-center rounded-xl bg-gold/10 text-xl">💎</div>
          <div>
            <div className="font-orbitron text-lg font-black text-gold">{Number(profile.zelixBalance || 0).toLocaleString('en-US')}</div>
            <div className="font-rajdhani text-xs font-black tracking-[.16em] text-white/45">ZELIX BALANS</div>
          </div>
        </div>
      </div>
    </div>
    <nav className="mt-6 space-y-1">
      {sidebarItems.map(([key, icon, label]) => {
        const isMembership = key === 'membership';
        const href = isMembership ? '/membership.html' : '#';
        const onClick = isMembership ? undefined : (e) => { e.preventDefault(); onNavigate(key); };
        const badge = key === 'messages' && counts.messages > 0 ? <span className="ml-auto grid h-5 min-w-[1.25rem] place-items-center rounded-full bg-gold px-1.5 text-[10px] font-black text-black">{counts.messages}</span> : null;
        return <a key={key} href={href} onClick={onClick} className={`sidebar-link ${active === key ? 'active' : ''}`}><span className="text-lg">{icon}</span>{label}{badge}</a>;
      })}
      <a href="#" onClick={e => { e.preventDefault(); onLogout(); }} className="sidebar-link text-red-300 hover:bg-red-500/10 hover:text-red-200"><span className="text-lg">⏻</span>Çıxış</a>
    </nav>
    <div className="relative mt-6 overflow-hidden rounded-3xl border border-gold/20 bg-[radial-gradient(circle_at_20%_10%,rgba(255,179,0,.25),transparent_34%),linear-gradient(135deg,rgba(138,46,255,.28),rgba(0,0,0,.9))] p-5">
      <div className="absolute -right-7 bottom-0 text-7xl opacity-25">🎮</div>
      <div className="relative z-10 font-orbitron text-lg font-black leading-tight text-gold">GÜCLÜ HESAB TƏHLÜKƏSİZ GƏLƏCƏK!</div>
      <a href="/support.html" className="relative z-10 mt-4 inline-block rounded-xl border border-gold/35 bg-black/40 px-4 py-2 font-rajdhani text-xs font-black text-gold transition hover:bg-gold hover:text-black">DƏSTƏK</a>
    </div>
  </aside>;
}

function DashboardSection({ profile, stats, recentOrders, loading }) {
  const quickActions = [['🛒', 'Sifariş et', '/'], ['💳', 'Balans yüklə', '#deposit'], ['🏷', 'Kupon əlavə et', '#coupons'], ['✉', 'Bildirişlər', '#messages']];
  const ring = profile.membershipLevel === 'premium' ? 'border-gold' : profile.membershipLevel === 'vip' ? 'border-blue' : 'border-violet';
  const badgeClass = profile.membershipLevel === 'premium' ? 'border-gold/40 bg-gold/15 text-gold' : profile.membershipLevel === 'vip' ? 'border-blue/40 bg-blue/15 text-blue' : 'border-violet/40 bg-violet/15 text-violet';
  const progress = Math.round((profile.loyaltyProgress || 0) * 100);
  return <div className="space-y-6">
    <section className="relative overflow-hidden rounded-[2rem] border border-white/10 bg-[radial-gradient(circle_at_78%_34%,rgba(255,179,0,.28),transparent_30%),radial-gradient(circle_at_18%_18%,rgba(138,46,255,.35),transparent_32%),linear-gradient(135deg,#101018,#000)] p-6 shadow-[0_28px_90px_rgba(0,0,0,.55)] sm:p-8">
      <div className="absolute inset-0 grid-bg opacity-25"></div>
      <div className="absolute right-4 top-0 font-orbitron text-[11rem] font-black leading-none text-white/[.035] sm:text-[16rem]">Z</div>
      <div className="relative z-10 flex min-h-[180px] flex-col justify-end">
        <div className="mb-4 inline-flex w-fit rounded-full border border-gold/25 bg-gold/10 px-4 py-2 font-rajdhani text-xs font-black tracking-[.2em] text-gold shadow-gold">ƏSAS PANEL</div>
        <h1 className="font-orbitron text-4xl font-black text-white sm:text-6xl"><span className="gold-text">Xoş gəldin,</span> {profile.username}</h1>
      </div>
    </section>
    <section className="grid gap-5 xl:grid-cols-[1.3fr_.7fr]">
      <div className="glass card-hover rounded-[2rem] p-6 shadow-[0_22px_70px_rgba(0,0,0,.42)]">
        <div className="flex flex-col gap-5 sm:flex-row sm:items-center">
          <Avatar size="h-28 w-28" ring={ring}/>
          <div className="flex-1">
            <div className="flex flex-wrap items-center gap-3">
              <h2 className="font-orbitron text-3xl font-black">{profile.username}</h2>
              <span className={`rounded-full border px-3 py-1 font-rajdhani text-xs font-black tracking-[.16em] ${badgeClass}`}>{profile.membershipLabel || 'Standard'} ÜZV</span>
            </div>
            <div className="mt-2 font-rajdhani text-sm font-black tracking-[.18em] text-gold">ID: {profile.memberId}</div>
            <p className="mt-2 text-sm text-white/60">{profile.title}</p>
            <p className="mt-1 text-sm text-white/42">Qoşulma tarixi: {profile.joinedAt}</p>
            {profile.nextMembershipLevel && <div className="mt-3">
              <div className="flex items-center justify-between text-xs text-white/60"><span>Növbəti səviyyə: {profile.nextMembershipLevel}</span><span>{progress}%</span></div>
              <div className="mt-1.5 h-2.5 overflow-hidden rounded-full bg-white/8"><div className="h-full rounded-full bg-gradient-to-r from-violet via-purple-500 to-gold" style={{ width: `${progress}%` }}></div></div>
            </div>}
          </div>
        </div>
      </div>
      <div className="glass card-hover rounded-[2rem] p-6 shadow-[0_22px_70px_rgba(0,0,0,.42)]">
        <div className="flex items-center justify-between gap-4">
          <h3 className="font-orbitron text-2xl font-black text-gold">BALANS</h3>
          <div className="grid h-16 w-16 place-items-center rounded-3xl border border-gold/40 bg-gold/20 font-orbitron text-2xl font-black text-white shadow-gold">₼</div>
        </div>
        <div className="mt-4 font-orbitron text-4xl font-black text-white">{formatMoney(profile.zelixBalance)}</div>
        <a href="#deposit" className="mt-6 inline-flex w-full items-center justify-center rounded-2xl bg-gradient-to-r from-amber-300 via-gold to-orange-500 py-3 font-orbitron text-sm font-black tracking-[.14em] text-black shadow-gold transition hover:-translate-y-1">ARTIR</a>
      </div>
    </section>
    <section className="glass card-hover rounded-[2rem] p-6">
      <h3 className="mb-4 font-orbitron text-xl font-black text-white">Sürətli əməliyyatlar</h3>
      <div className="grid gap-3 sm:grid-cols-2 lg:grid-cols-4">
        {quickActions.map(([icon, label, href]) => <a key={label} href={href} className="group flex items-center gap-3 rounded-2xl border border-white/10 bg-white/[.03] p-4 transition hover:border-gold/40 hover:bg-white/[.06]"><span className="text-2xl">{icon}</span><span className="font-rajdhani font-bold tracking-wide text-white/80 group-hover:text-white">{label}</span><span className="ml-auto text-gold">›</span></a>)}
      </div>
    </section>
    <section className="glass card-hover rounded-[2rem] p-6 shadow-[0_22px_70px_rgba(0,0,0,.42)]">
      <div className="mb-4 flex items-center justify-between">
        <h3 className="font-orbitron text-xl font-black">Son sifarişlər</h3>
        <a href="#orders" className="text-sm font-bold text-gold hover:underline">Hamısını gör</a>
      </div>
      {loading && <div className="text-sm text-white/60">Yüklənir...</div>}
      {!loading && recentOrders.length === 0 && <div className="rounded-xl border border-white/10 bg-white/[.03] p-4 text-sm text-white/60">Hələ sifariş yoxdur.</div>}
      <div className="grid gap-3">
        {recentOrders.map(o => <div key={o.id} className="rounded-2xl border border-white/10 bg-white/[.03] p-4">

            <div className="font-orbitron text-lg font-black">{o.game || 'Oyun'} <span className="text-sm text-white/50">{o.package || (o.items && o.items[0] && o.items[0].title)}</span></div>

          </div>
          <div className="mt-2 grid grid-cols-2 gap-2 text-sm text-white/70 sm:grid-cols-4">
            <div>Cəmi: <span className="font-orbitron text-gold">{formatMoney(o.total_amount || o.price)}</span></div>
            <div>ID: <span className="font-orbitron">{o.player_id || '—'}</span></div>
            <div>Tarix: <span className="font-orbitron">{formatDateShort(o.created_at)}</span></div>
            <div>Miqdar: <span className="font-orbitron">{(o.items || []).reduce((s, i) => s + i.quantity, 0) || o.quantity || 1}</span></div>
          </div>
        </div>)}
      </div>
    </section>
  </div>;
}

function OrdersSection() {
  const { data, loading, error, reload } = useFetch('/api/orders');
  const orders = data?.orders || [];
  const { tick } = useSSE();
  React.useEffect(() => { if (tick) reload(); }, [tick, reload]);
  return <div className="space-y-6">
    <div className="glass rounded-[2rem] p-6">
      <h2 className="font-orbitron text-3xl font-black text-gold">Sifarişlərim</h2>
      <p className="mt-2 text-sm text-white/55">Bütün sifarişlərinizi real vaxtda izləyin.</p>
    </div>
    <div className="glass card-hover rounded-[2rem] p-5 shadow-[0_30px_80px_rgba(0,0,0,.55)]">
      {loading && <div className="text-sm text-white/60">Yüklənir...</div>}
      {error && <div className="mb-3 rounded-xl border border-red-500/30 bg-red-500/10 p-3 text-sm text-red-200">{error}</div>}
      {orders.length === 0 && !loading && <div className="flex flex-col items-center rounded-2xl border border-dashed border-white/15 bg-white/[.02] p-10 text-center">

function DepositSection({ onToast }) {
  const [amount, setAmount] = React.useState('');
  const [file, setFile] = React.useState(null);
  const [busy, setBusy] = React.useState(false);
  const [msg, setMsg] = React.useState(null);
  const [deposits, setDeposits] = React.useState([]);
  const fileRef = React.useRef(null);
  function load() { apiRequest('/api/deposits').then(d => setDeposits(d.deposits || [])).catch(() => {}); }
  React.useEffect(load, []);
  async function submit(e) {
    e.preventDefault(); setMsg(null);
    if (!file) { setMsg({ type: 'bad', text: 'Zəhmət olmasa qəbz şəklini seçin.' }); return; }
    if (!['image/jpeg', 'image/png'].includes(file.type)) { setMsg({ type: 'bad', text: 'Yalnız JPG və ya PNG faylları qəbul olunur.' }); return; }
    if (file.size > 5 * 1024 * 1024) { setMsg({ type: 'bad', text: 'Fayl 5MB-dan böyük ola bilməz.' }); return; }
    setBusy(true);
    try {
      const token = localStorage.getItem('zelixToken');
      const fd = new FormData();
      if (amount) fd.append('amount', amount);
      fd.append('receipt', file);
      const res = await fetch('/api/deposits', { method: 'POST', credentials: 'same-origin', headers: token ? { Authorization: `Bearer ${token}` } : {}, body: fd });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || 'Yükləmə uğursuz oldu.');
      setMsg({ type: 'ok', text: data.message });
      setAmount(''); setFile(null); if (fileRef.current) fileRef.current.value = '';
      load();
    } catch (err) { setMsg({ type: 'bad', text: err.message }); }
    finally { setBusy(false); }
  }
  const card = { name: 'Capital Bank', number: '4169 7388 2684 0203', holder: 'ZELIX TOPUP MMC' };
  async function copyCard() { await copyText(card.number); onToast('Kart nömrəsi kopyalandı'); }

      <p className="mt-2 text-sm text-white/55">Ödəniş edin, qəbz yükləyin, admin təsdiqindən sonra balans artırılacaq.</p>
    </div>
    <div className="grid gap-5 lg:grid-cols-2">

        <p className="mt-1 text-sm text-white/55">Ödənişi aşağıdakı kart vasitəsilə edin və qəbzi yükləyin.</p>

          <div className="mx-auto mb-4 grid h-20 w-56 place-items-center rounded-2xl bg-white/95 p-3">
            <img src="https://upload.wikimedia.org/wikipedia/commons/f/f3/Kapital_Bank_logo_2025.png" alt="Capital Bank" className="max-h-full max-w-full object-contain"/>
          </div>
          <div className="font-orbitron text-xl font-black tracking-widest text-white sm:text-2xl">{card.number}</div>
          <div className="mt-2 text-sm text-white/70">{card.holder}</div>
        </div>
        <button onClick={copyCard} className="mt-4 w-full rounded-2xl border border-gold/30 bg-gold/10 py-3 font-rajdhani font-bold tracking-wide text-gold transition hover:bg-gold hover:text-black">Kart nömrəsini kopyala</button>
      </div>
      <div className="glass card-hover rounded-[2rem] p-5 shadow-[0_30px_80px_rgba(0,0,0,.55)] sm:p-7">
        <div className="mb-4 flex items-center justify-between">
          <h3 className="font-orbitron text-xl font-black text-gold">Qəbz yüklə</h3>
          <span className="rounded-full border border-violet/30 bg-violet/10 px-3 py-1 font-rajdhani text-xs font-black tracking-[.16em] text-violet">JPG/PNG</span>

        <form onSubmit={submit} className="grid gap-4">
          <label className="block">
            <span className="mb-2 block font-rajdhani text-sm font-black tracking-[.12em] text-white/58">Məbləğ (₼)</span>
            <input type="number" step="0.01" min="0" value={amount} onChange={e => setAmount(e.target.value)} placeholder="məs. 50" className="h-14 w-full rounded-2xl border border-white/10 bg-black/35 px-4 text-sm font-bold text-white outline-none transition focus:border-blue focus:shadow-blue placeholder:text-white/30"/>

            <input ref={fileRef} type="file" accept="image/jpeg,image/png,.jpg,.jpeg,.png" onChange={e => setFile(e.target.files[0] || null)} className="h-14 w-full rounded-2xl border border-white/10 bg-black/35 px-3 py-3 text-sm text-white/70 outline-none file:mr-3 file:rounded-xl file:border-0 file:bg-gold/20 file:px-4 file:py-2 file:font-rajdhani file:font-black file:text-gold"/>

          <button type="submit" disabled={busy} className={`h-14 rounded-2xl bg-gradient-to-r from-amber-300 via-gold to-orange-500 px-6 font-orbitron text-sm font-black tracking-[.14em] text-black shadow-gold transition hover:-translate-y-1 ${busy ? 'opacity-60 cursor-wait' : ''}`}>{busy ? 'YÜKLƏNİR...' : 'GÖNDƏR'}</button>

  async function loadRecent() { try { const d = await apiRequest('/api/orders/recent'); setRecentOrders(d.orders || []); } catch (e) {} }
  async function loadNotifications() { try { const d = await apiRequest('/api/notifications'); setNotifications(d.notifications || []); } catch (e) {} }

  React.useEffect(() => { loadProfile(); loadRecent(); loadNotifications(); }, []);
  React.useEffect(() => { loadProfile(); loadRecent(); loadNotifications(); }, [tick]);
  React.useEffect(() => {
    const hash = window.location.hash.replace('#', '');
    if (hash && sidebarItems.some(i => i[0] === hash)) setSection(hash);
  }, []);
  React.useEffect(() => { if (!toast) return; const t = setTimeout(() => setToast(null), 2200); return () => clearTimeout(t); }, [toast]);

  function navigate(key) {
    if (key === 'membership') { window.location.href = '/membership.html'; return; }
    setSection(key);
    window.location.hash = key;
  }
  async function action(url, body) {
    try {
      const data = await apiRequest(url, { method: 'POST', body: JSON.stringify(body) });
      if (data.profile) setProfile(data.profile);
      setMessage({ type: 'ok', text: data.message });
    } catch (error) { setMessage({ type: 'bad', text: error.message }); }
  }
  async function saveProfile(form) {
    await action('/api/profile', form);
    if (form.password || form.confirmPassword) await action('/api/password', { password: form.password, confirmPassword: form.confirmPassword });
  }
  async function logout() {
    if (loggingOut) return;
    setLoggingOut(true);
    try {
      const res = await fetch('/api/logout', { method: 'POST', credentials: 'same-origin', headers: { 'Content-Type': 'application/json', ...(localStorage.getItem('zelixToken') ? { Authorization: `Bearer ${localStorage.getItem('zelixToken')}` } : {}) }, body: '{}' });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || data.success === false) throw new Error(data.message || 'Çıxış uğursuz oldu.');
      localStorage.removeItem('zelixToken');
      localStorage.removeItem('zelixUser');
      location.href = '/login-v2.html';
    } catch (error) { setMessage({ type: 'bad', text: error.message || 'Çıxış zamanı xəta baş verdi.' }); setLoggingOut(false); }
  }

  const unreadCount = notifications.filter(n => !n.is_read).length;
  let content = null;
  if (section === 'dashboard') content = <DashboardSection profile={profile} stats={stats} recentOrders={recentOrders} loading={loading}/>;
  else if (section === 'orders') content = <OrdersSection/>;
  else if (section === 'deposit') content = <DepositSection onToast={setToast}/>;
  else if (section === 'transactions') content = <TransactionsSection/>;
  else if (section === 'coupons') content = <CouponsSection onToast={setToast}/>;
  else if (section === 'statistics') content = <StatisticsSection stats={stats}/>;
  else if (section === 'settings') content = <SettingsSection profile={profile} onSave={saveProfile} message={message}/>;
  else if (section === 'messages') content = <MessagesSection/>;

  return <main className="relative flex min-h-screen flex-col bg-black text-white">
    <div className="fixed inset-0 grid-bg opacity-20"></div>
    <div className="fixed left-[-12rem] top-[-12rem] h-[34rem] w-[34rem] rounded-full bg-violet/25 blur-3xl"></div>
    <div className="fixed bottom-[-12rem] right-[-12rem] h-[36rem] w-[36rem] rounded-full bg-gold/15 blur-3xl"></div>
    {message && <div className={`fixed right-4 top-4 z-50 rounded-2xl border px-4 py-3 text-sm font-bold shadow-lg ${message.type === 'bad' ? 'border-red-400/40 bg-red-500/15 text-red-200' : 'border-emerald-400/40 bg-emerald-500/15 text-emerald-200'}`}>{message.text}</div>}
    <div className={`copy-hint rounded-full border border-gold/30 bg-gold/15 px-4 py-2 text-sm font-bold text-gold ${toast ? 'show' : ''}`}>{toast}</div>
    <div className="relative z-10 mx-auto flex w-full max-w-[1600px] flex-1 flex-col gap-6 px-4 py-6 sm:px-6 lg:flex-row lg:px-8">
      <Sidebar active={section} profile={profile} onNavigate={navigate} onLogout={logout} counts={{ messages: unreadCount }}/>
      <div className="flex flex-1 flex-col space-y-6">
        {content}
        <Footer/>
      </div>
    </div>
  </main>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
