<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Səbət | ZELIX TOPUP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Orbitron:wght@700;800;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared-background.css">
<script src="https://cdn.tailwindcss.com"></script>
<script src="/header.js" defer></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          inter: ['Inter', 'sans-serif'],
          orbitron: ['Orbitron', 'sans-serif'],
          rajdhani: ['Rajdhani', 'sans-serif']
        },
        colors: {
          gold: '#ffb300',
          violet: '#8a2eff',
          blue: '#00c8ff',
          ink: '#07070a'
        },
        boxShadow: {
          gold: '0 0 22px rgba(255,179,0,.42)',
          violet: '0 0 24px rgba(138,46,255,.38)',
          blue: '0 0 22px rgba(0,200,255,.3)'
        }
      }
    }
  }
</script>
<style>
  .grid-bg{background-image:linear-gradient(rgba(255,255,255,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.045) 1px,transparent 1px);background-size:48px 48px}
</style>
<link rel="stylesheet" href="/responsive.css">
</head>
<body class="min-h-screen bg-black text-white font-inter">
  <div class="particles">
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
  </div>

  <main class="relative z-10 mx-auto max-w-[1200px] px-4 py-6 sm:px-6 lg:px-8">
    <div class="mb-6 flex items-center justify-between">
      <h1 class="font-orbitron text-2xl font-black sm:text-3xl"><span class="text-gold">Səbət</span></h1>
      <a href="/mehsullar.html" class="rounded-xl border border-white/10 px-3 py-2 font-rajdhani text-xs font-black text-white/70 transition hover:border-gold hover:text-gold">Alış-verişə davam et</a>
    </div>

    <div class="grid gap-6 lg:grid-cols-[1fr_360px]">
      <div id="cartList" class="space-y-4">
        <div class="rounded-2xl border border-white/10 bg-white/[.03] p-8 text-center">
          <div class="mx-auto h-10 w-10 animate-spin rounded-full border-4 border-white/10 border-t-gold"></div>
        </div>
      </div>

      <div class="h-fit rounded-2xl border border-white/10 bg-white/[.03] p-5">
        <div class="font-orbitron text-lg font-black text-white">Səbət Məbləği</div>
        <div class="mt-4 space-y-3">
          <div class="flex items-center justify-between font-rajdhani text-sm font-bold text-white/70">
            <span>Məhsul sayı</span>
            <span id="summaryCount" class="text-white">0</span>
          </div>
          <div class="flex items-center justify-between font-rajdhani text-sm font-bold text-white/70">
            <span>Ara cəmi</span>
            <span id="summarySubtotal" class="text-white">0.00 ₼</span>
          </div>
          <div class="flex items-center justify-between font-rajdhani text-sm font-bold text-white/70">
            <span>Cari balans</span>
            <span id="summaryBalance" class="text-white">0.00 ₼</span>
          </div>
          <div class="flex items-center justify-between font-rajdhani text-sm font-bold text-white/70">
            <span>Qalan balans</span>
            <span id="summaryRemaining" class="text-white">0.00 ₼</span>
          </div>
          <div class="border-t border-white/10 pt-3">
            <div class="flex items-center justify-between font-orbitron text-lg font-black">
              <span class="text-gold">Cəmi</span>
              <span id="summaryTotal" class="text-gold">0.00 ₼</span>
            </div>
          </div>
        </div>

        <div id="balanceWarning" class="mt-4 hidden rounded-xl border border-red-400/30 bg-red-500/10 p-3 text-xs font-bold text-red-300">
          Balansınız kifayət etmir. <a href="/balance/topup" class="text-gold underline">Balans artır</a>
        </div>

        <div class="mt-5 space-y-3">
          <div>
            <label class="mb-1 block font-rajdhani text-xs font-black text-white/60">Oyunçu ID</label>
            <input id="playerId" type="text" class="w-full rounded-xl border border-white/10 bg-black/40 p-3 text-sm text-white outline-none focus:border-gold" placeholder="1234567890">
          </div>
          <button id="checkoutBtn" class="w-full rounded-xl bg-gradient-to-r from-amber-300 via-gold to-orange-500 py-3 font-orbitron text-sm font-black tracking-[.05em] text-black shadow-gold transition hover:-translate-y-0.5 disabled:opacity-50 disabled:cursor-not-allowed">Sifarişi tamamla</button>
          <button id="clearBtn" class="w-full rounded-xl border border-white/10 bg-white/[.04] py-2 font-rajdhani text-xs font-black text-white/70 transition hover:border-red-400/40 hover:text-red-300">Səbəti təmizlə</button>
        </div>
      </div>
    </div>
  </main>

  <div id="toast" class="fixed bottom-5 right-5 z-50 translate-y-20 transform rounded-2xl border border-gold/40 bg-black/90 px-4 py-3 text-sm font-bold text-gold opacity-0 shadow-gold transition-all"></div>

<script>
const token = localStorage.getItem('zelixToken');
let cart = { items: [], subtotal: 0, count: 0 };
let balance = 0;

async function api(url, opts={}){
  const res = await fetch(url, { ...opts, credentials: 'same-origin', headers: { 'Content-Type': 'application/json', ...(token?{Authorization:`Bearer ${token}`}:{}) } });
  const text = await res.text();
  let data = {};
  try{ data = text ? JSON.parse(text) : {}; }catch{ throw new Error('Server cavabı JSON deyil'); }
  if(!res.ok) throw new Error(data.message || 'Sorğu uğursuz oldu');
  return data;
}

function showToast(msg, type='good'){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `fixed bottom-5 right-5 z-50 rounded-2xl border px-4 py-3 text-sm font-bold shadow-lg transition-all transform ${type==='good'?'border-gold/40 bg-black/90 text-gold shadow-gold':'border-red-400/40 bg-black/90 text-red-300'}`;
  t.style.opacity = '1';
  t.style.transform = 'translateY(0)';
  setTimeout(()=>{ t.style.opacity='0'; t.style.transform='translateY(20px)'; }, 2500);
}

function fmt(n){ return Number(n || 0).toFixed(2) + ' ₼'; }

async function loadCart(){
  try {
    const data = await api('/api/cart');
    cart = data.cart || { items: [], subtotal: 0, count: 0 };
    const me = await api('/api/me');
    balance = Number(me.user?.balance || 0);
    render();
  } catch (err) {
    document.getElementById('cartList').innerHTML = '<div class="rounded-2xl border border-white/10 bg-white/[.03] p-8 text-center text-red-300">' + err.message + '</div>';
  }
}

function updateSummary(){
  document.getElementById('summaryCount').textContent = cart.count || 0;
  document.getElementById('summarySubtotal').textContent = fmt(cart.subtotal);
  document.getElementById('summaryBalance').textContent = fmt(balance);
  document.getElementById('summaryTotal').textContent = fmt(cart.subtotal);
  const remaining = balance - (cart.subtotal || 0);
  document.getElementById('summaryRemaining').textContent = fmt(remaining);
  const warning = document.getElementById('balanceWarning');
  const checkout = document.getElementById('checkoutBtn');
  if (balance < (cart.subtotal || 0)) {
    warning.classList.remove('hidden');
    checkout.disabled = true;
    checkout.textContent = 'Balansınız kifayət etmir';
  } else {
    warning.classList.add('hidden');
    checkout.disabled = (cart.items || []).length === 0;
    checkout.textContent = 'Sifarişi tamamla';
  }
}

function render(){
  const list = document.getElementById('cartList');
  if (!cart.items.length) {
    list.innerHTML = `
      <div class="rounded-2xl border border-white/10 bg-white/[.03] p-10 text-center">
        <div class="font-orbitron text-lg font-black text-white/70">Səbətiniz boşdur</div>
        <a href="/mehsullar.html" class="mt-3 inline-block rounded-xl bg-gold/10 px-5 py-2 font-rajdhani text-sm font-black text-gold border border-gold/40 transition hover:bg-gold hover:text-black">Məhsullara bax</a>
      </div>
    `;
    updateSummary();
    return;
  }
  list.innerHTML = cart.items.map(it => `
    <div class="flex flex-col gap-4 rounded-2xl border border-white/10 bg-white/[.03] p-4 sm:flex-row sm:items-center">
      <img src="${it.imageUrl || '/assets/zelix-generated-logo.svg'}" class="h-20 w-20 rounded-xl border border-white/10 bg-white/[.06] object-cover p-1" onerror="this.src='/assets/zelix-generated-logo.svg'">
      <div class="flex-1 min-w-0">
        <div class="font-orbitron text-lg font-black truncate">${it.title}</div>
        <div class="font-rajdhani text-sm text-white/50">${it.game || ''}</div>
        <div class="mt-1 font-orbitron text-sm font-black text-gold">${fmt(it.unitPrice || it.price)}</div>
      </div>
      <div class="flex items-center gap-4">
        <div class="inline-flex items-center gap-2 rounded-xl border border-white/10 bg-black/30 px-2 py-1">
          <button class="qty-dec px-2 text-white/70 hover:text-white" data-id="${it.id}">-</button>
          <span class="qty font-orbitron w-6 text-center" data-id="${it.id}">${it.quantity}</span>
          <button class="qty-inc px-2 text-white/70 hover:text-white" data-id="${it.id}">+</button>
        </div>
        <div class="font-orbitron text-lg font-black text-gold min-w-[90px] text-right">${fmt((it.unitPrice || it.price) * it.quantity)}</div>
        <button class="remove-btn text-white/40 transition hover:text-red-300" data-id="${it.id}" aria-label="Sil">
          <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        </button>
      </div>
    </div>
  `).join('');

  document.querySelectorAll('.qty-inc').forEach(b => b.addEventListener('click', async () => {
    const el = document.querySelector(`.qty[data-id="${b.dataset.id}"]`);
    const next = Math.min(99, Number(el.textContent) + 1);
    await updateQty(b.dataset.id, next);
  }));
  document.querySelectorAll('.qty-dec').forEach(b => b.addEventListener('click', async () => {
    const el = document.querySelector(`.qty[data-id="${b.dataset.id}"]`);
    const next = Math.max(1, Number(el.textContent) - 1);
    await updateQty(b.dataset.id, next);
  }));
  document.querySelectorAll('.remove-btn').forEach(b => b.addEventListener('click', async () => {
    if (!confirm('Məhsulu səbətdən silmək istəyirsiniz?')) return;
    try {
      await api('/api/cart/items/' + b.dataset.id, { method: 'DELETE' });
      showToast('Səbətdən silindi');
      await loadCart();
    } catch (err) { showToast(err.message, 'bad'); }
  }));
  updateSummary();
}

async function updateQty(itemId, quantity){
  try {
    await api('/api/cart/items/' + itemId, { method: 'PUT', body: JSON.stringify({ quantity }) });
    await loadCart();
  } catch (err) { showToast(err.message, 'bad'); }
}

document.getElementById('clearBtn').addEventListener('click', async () => {
  if (!cart.items.length) return;
  if (!confirm('Bütün səbəti təmizləmək istəyirsiniz?')) return;
  try {
    await api('/api/cart/clear', { method: 'DELETE' });
    showToast('Səbət təmizləndi');
    await loadCart();
  } catch (err) { showToast(err.message, 'bad'); }
});

document.getElementById('checkoutBtn').addEventListener('click', async () => {
  const playerId = document.getElementById('playerId').value.trim();
  if (!playerId) return showToast('Oyunçu ID daxil edin', 'bad');
  if (balance < cart.subtotal) return showToast('Balansınız kifayət etmir', 'bad');
  try {
    const res = await api('/api/cart/checkout', { method: 'POST', body: JSON.stringify({ playerId }) });
    showToast(res.message || 'Sifariş tamamlandı');
    await loadCart();
  } catch (err) { showToast(err.message, 'bad'); }
});

loadCart();
</script>
<script src="/footer.js" defer></script>
</body>
</html>
